site_name: Code and Core University
site_description: From Zero to Confident Programmer
site_author: Mohan G.C.
site_url: https://mohangc07.github.io/code-and-core-university/

theme:
  name: material
  language: en

  palette:
    - scheme: default
      primary: blue
      accent: indigo

  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.tabs.link

plugins:
  - search

markdown_extensions:
  - admonition
  - tables
  - footnotes
  - toc:
      permalink: true
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true

nav:
    - Home: index.md

    - Company:
      - Overview: 00-company/index.md
      - Mission: 00-company/mission.md
      - Vision: 00-company/vision.md
      - Values: 00-company/values.md
      - Brand: 00-company/brand.md
      - Teaching Philosophy: 00-company/teaching-philosophy.md
      - Learning Philosophy: 00-company/learning-philosophy.md
      - Quality Standards: 00-company/quality-standards.md
      - Roadmap: 00-company/roadmap.md

    - Curriculum:
      - Overview: 01-curriculum/index.md

    - Schools:
      - Overview: 02-schools/index.md

    - Programs:
      - Overview: 03-programs/index.md

    - Courses:
      - Overview: 04-courses/index.md

    - Modules:
      - Overview: 05-modules/index.md

    - Lessons:
      - Overview: 06-lessons/index.md

    - Projects:
      - Overview: 07-projects/index.md

    - Assessments:
      - Overview: 08-assessments/index.md

    - YouTube:
      - Overview: 09-youtube/index.md

    - Website:
      - Overview: 10-website/index.md

    - Business:
      - Overview: 11-business/index.md

    - Marketing:
      - Overview: 12-marketing/index.md

    - Operations:
      - Overview: 13-operations/index.md

    - SOPs:
      - Overview: 14-sops/index.md

    - Resources:
      - Overview: 15-resources/index.md

    - Templates:
      - Overview: 16-templates/index.md

    - Appendix:
      - Overview: 17-appendix/index.md  
site_name: Code and Core University
site_description: From Zero to Confident Programmer
site_author: Mohan G.C.
site_url: https://mohangc07.github.io/code-and-core-university/

theme:
  name: material
  language: en

  palette:
    - scheme: default
      primary: blue
      accent: indigo

  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.tabs.link

plugins:
  - search

markdown_extensions:
  - admonition
  - tables
  - footnotes
  - toc:
      permalink: true
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true

nav:
    - Home: index.md

    - Company:
      - Overview: 00-company/index.md
      - Mission: 00-company/mission.md
      - Vision: 00-company/vision.md
      - Values: 00-company/values.md
      - Brand: 00-company/brand.md
      - Teaching Philosophy: 00-company/teaching-philosophy.md
      - Learning Methodology: 00-company/learning-methodology.md
      - Course Design Standards: 00-company/course-design-standards.md
      - Instructor Standards: 00-company/instructor-standards.md
      - Learner Standards: 00-company/learner-standards.md
      - Operational Standards: 00-company/operational-standards.md
      - Roadmap: 00-company/roadmap.md

    - Operations:
      - Documentation Standards: 02-operations/documentation-standards.md
      - Version Control & Git Workflow: 02-operations/version-control-git-workflow.md
      - Architecture Decision Records: 02-operations/architecture-decision-records.md
      - Quality Assurance Standards: 02-operations/quality-assurance-standards.md
      - Risk Management Standards: 02-operations/risk-management-standards.md
      - Knowledge Management Standards: 02-operations/knowledge-management-standards.md
      - Research & Innovation Standards: 02-operations/research-innovation-standards.md
      - Data & AI Governance Standards: 02-operations/data-ai-governance-standards.md
